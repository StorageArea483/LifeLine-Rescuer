name: life_line_rescuer
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  flutter_riverpod: ^3.3.1
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.5.0
  google_sign_in: ^7.2.0
  connectivity_plus: ^6.1.5
  appwrite: ^14.0.0
  path_provider: ^2.1.6
  open_filex: ^4.7.0

  #For OpenStreetMap
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  flutter_map_location_marker: ^10.1.0
  http: ^1.6.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

dependency_overrides:
  flutter_web_auth_2: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/offline_logos/
    - assets/fonts/


  # Fonts
  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/SFPRODISPLAYREGULAR.OTF
          weight: 400
        - asset: assets/fonts/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/SFPRODISPLAYSEMIBOLDITALIC.OTF
          weight: 600
        - asset: assets/fonts/SFPRODISPLAYBOLD.OTF
          weight: 700
